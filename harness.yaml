# ==========================================
# HarnessingLab v1.5 — Industrial Production Control Plane
# ==========================================
project:
  name: "Industrial-Todo-Factory"
  version: "1.5.0"
  env: "production"

# ------------------------------------------
# THE AIR-GAP: Path Management
# All harness output lives under ./project/ so the repo root stays clean (framework + harness.yaml only).
# ------------------------------------------
paths:
  architecture_doc: "./project/ARCHITECTURE.md"
  specification_doc: "./project/SPEC.md"
  history_log: "./project/docs/history.json"
  distillation_export: "./project/docs/trajectories.jsonl"
  wisdom_store: "./project/docs/wisdom_chroma"
  interfaces_file: "./project/docs/interfaces.json"

  workspace_dir: "./project/workspace"
  plan_file: "./project/workspace/PLAN.md"
  prompt_buffer: "./project/workspace/.harness_prompt.md"
  screenshot_target: "./project/workspace/.harness_screenshot.png"

# ------------------------------------------
# THE EFFICIENCY ENGINE: Model distribution (per role)
# ------------------------------------------
# Set model id per role here. API keys live in .env only — see .env.example.
#
# Roles:
#   planner / generator — Claude CLI (--model); no _provider keys.
#   evaluator / contract_verifier — Brain HTTP API; optional per-role:
#     {role}_provider: anthropic | openai | openai-compatible
#     {role}_base_url: required for openai-compatible; optional for openai (Azure, proxy).
#
# Examples (uncomment and adjust):
#   evaluator_provider: "openai"
#   evaluator: "gpt-4o"
#   contract_verifier_provider: "openai-compatible"
#   contract_verifier_base_url: "https://api.deepseek.com"
#   contract_verifier: "deepseek-reasoner"
models:
  planner: "claude-opus-4-6"
  generator: "claude-haiku-4-6"
  evaluator: "gpt-4o"
  evaluator_provider: "openai"
  # gpt-4o supports vision (image_url payloads). deepseek-* does not — do not use for playwright strategy.
  contract_verifier: "deepseek-reasoner"
  contract_verifier_provider: "openai-compatible"
  contract_verifier_base_url: "https://api.deepseek.com"

# ------------------------------------------
# THE SANDBOX: Execution Environment
# ------------------------------------------
runtime:
  mode: "local"
  image: "harnesslab-sandbox:latest"
  memory_limit: "2g"
  network_access: false

# ------------------------------------------
# THE HATER: Quality Assurance Logic
# ------------------------------------------
evaluation:
  strategy: "playwright"
  # Build the Next.js app; kill any stale server on 3001, start fresh, wait for ready.
  build_command: "pnpm build && fuser -k 3001/tcp 2>/dev/null; node_modules/.bin/next start -p 3001 & sleep 8"
  # Optional when test_first: shell command with {task_id}, {contract_rel}, {contract_path}
  # contract_test_command: "npx vitest run {contract_rel}"
  planner_timeout_seconds: 900
  playwright_target: "http://localhost:3001?city=London"
  # Vendored design bar (Anthropic frontend-design skill — see project/docs/frontend-design-skill.md).
  # Appended to the vision prompt by PlaywrightVisualEvaluator._vision_prompt_text().
  vision_rubric_supplement: "./project/docs/frontend-design-skill.md"
  vision_rubric: |
    You are a strict design QA reviewer for a glassmorphic weather dashboard. Default stance: REJECT unless all criteria below are clearly met.

    **Background gradient (SPEC §F6)**
    - Full-viewport gradient from deep indigo/violet to teal/cyan — hex anchors: #1a0533 → #0f2027 → #0a3d62 → #0c6478.
    - Gradient transitions must be visible; a single flat dark color is REJECT.

    **Glassmorphism cards**
    - Every card must appear semi-transparent over the gradient (backdrop-blur + bg-white/10 or similar).
    - Opaque solid-color cards with no visible gradient behind them → REJECT.

    **Typography (SPEC §F2)**
    - City name: large serif (Playfair Display), text-5xl minimum, clearly distinct from body text.
    - Hero temperature: large serif, text-7xl minimum — must dominate the page visually.
    - Body/labels: sans-serif (Inter), clearly different from the headings.
    - If there is no visible serif vs sans-serif distinction → REJECT.

    **Content completeness**
    - Current weather card: city name, temperature with unit (°C or °F), weather description, Lucide icon, “Feels like” text.
    - Detail grid: 4 metric tiles (Humidity, Wind Speed, Pressure, Visibility) with values and icons.
    - Forecast strip: 5 day cards each with day name, icon, high and low temperature.
    - Missing any of these sections → REJECT.

    **Color palette**
    - Text: white or white with opacity. No dark text on dark background.
    - Accent icons and interactive elements: sky-400 (#38bdf8) hue.
    - No bright neon colors, no light-mode styling.

    **Layout**
    - Content centered with clear max-width (not edge-to-edge on a 1280px viewport).
    - Generous spacing between sections.
    - Search bar and unit toggle visible at the top.

    **Scoring**
    Score 1–10 against the criteria above. APPROVE if score ≥ 8 and no mandatory item fails.
    End your response with exactly one line: `VERDICT: APPROVE` or `VERDICT: REJECT`.

# ------------------------------------------
# THE CIRCUIT BREAKER: Resilience & Economics
# ------------------------------------------
orchestration:
  mode: "linear"
  epic_file: "./project/docs/EPIC.md"
  sub_workspace_isolation: "subrepo"
  max_retries_per_task: 3
  interactive_mode: false
  auto_rollback: true
  distillation_mode: false
  wisdom_rag: true
  test_first: true
  contract_negotiation_max_retries: 3

# ------------------------------------------
# THE SCIENTIST: Ablation Study Controls
# Set any flag to true to disable that component for comparative runs.
# ------------------------------------------
ablation:
  disable_wisdom_rag: false
  disable_contract_negotiation: false
  single_model_mode: false
  disable_playwright: false
